<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>90's Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d0015;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'VT323', monospace;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 100%;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        
        #crtOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 3px
            );
            z-index: 100;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 50;
        }
        
        .score-panel {
            color: #00FFFF;
            font-size: 28px;
            text-shadow: 0 0 10px #00FFFF, 0 0 20px #00FFFF;
            line-height: 1.4;
        }
        
        .score-panel .label {
            color: #FF00FF;
            text-shadow: 0 0 10px #FF00FF;
        }
        
        .score-panel span {
            color: #FFFF00;
            text-shadow: 0 0 10px #FFFF00;
        }
        
        #lives {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 32px;
            color: #FF00FF;
            text-shadow: 0 0 10px #FF00FF;
            z-index: 50;
            pointer-events: none;
        }
        
        #powerup {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 28px;
            color: #39FF14;
            text-shadow: 0 0 10px #39FF14;
            z-index: 50;
            pointer-events: none;
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(13, 0, 21, 0.95);
            z-index: 80;
            cursor: pointer;
        }
        
        #overlay.hidden {
            display: none;
        }
        
        #overlay h1 {
            font-size: 72px;
            background: linear-gradient(90deg, #FF00FF, #00FFFF, #FFFF00, #39FF14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px #FF00FF) drop-shadow(0 0 40px #00FFFF);
            animation: neonPulse 2s ease-in-out infinite;
            margin-bottom: 10px;
        }
        
        #overlay .tagline {
            font-size: 24px;
            color: #FF00FF;
            text-shadow: 0 0 10px #FF00FF;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }
        
        #overlay .prompt {
            font-size: 32px;
            color: #00FFFF;
            text-shadow: 0 0 15px #00FFFF;
            animation: blink 1s step-end infinite;
        }
        
        #startBtn {
            display: block;
            margin-top: 20px;
            padding: 20px 60px;
            font-family: 'VT323', monospace;
            font-size: 32px;
            background: linear-gradient(180deg, #FF00FF, #AA00AA);
            border: 3px solid #00FFFF;
            color: #fff;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            box-shadow: 0 0 20px #FF00FF, inset 0 0 20px rgba(255,255,255,0.2);
            z-index: 100;
        }
        
        #startBtn:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px #FF00FF;
        }
        
        #overlay .prompt {
            display: none;
        }
        
        #overlay .controls {
            margin-top: 30px;
            font-size: 20px;
            color: #888;
        }
        
        #charSelect {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 0, 21, 0.98);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        #charSelect.show {
            display: flex;
        }
        
        #charSelect h2 {
            color: #FF00FF;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #FF00FF;
        }
        
        .char-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 500px;
        }
        
        .char-slot {
            width: 120px;
            height: 140px;
            border: 3px solid rgba(255, 0, 255, 0.5);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: rgba(255, 0, 255, 0.1);
            overflow: hidden;
            position: relative;
            padding: 5px;
        }
        
        .char-slot.selected {
            border-color: #00FFFF;
            box-shadow: 0 0 25px #00FFFF;
        }
        
        .char-slot img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .char-slot .char-name {
            color: #00FFFF;
            font-size: 14px;
            margin-top: 5px;
            text-align: center;
            word-break: break-word;
        }
        
        .char-slot .plus {
            font-size: 40px;
            color: rgba(255, 0, 255, 0.7);
        }
        
        .char-slot .add-char {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        
        .char-slot .upload-input {
            display: none;
        }
        
        #nameInput {
            display: none;
            margin: 15px 0;
            padding: 12px 20px;
            font-family: 'VT323', monospace;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00FFFF;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            width: 200px;
        }
        
        #nameInput.show {
            display: block;
        }
        
        #myCharsArea {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,0,255,0.3);
        }
        
        #myCharsArea h3 {
            color: #FFFF00;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        #allCharsArea h3 {
            color: #39FF14;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #FF00FF;
            padding: 15px;
            border-radius: 10px;
            color: #00FFFF;
            font-size: 18px;
            z-index: 50;
            min-width: 150px;
        }
        
        #leaderboard h3 {
            color: #FFFF00;
            margin-bottom: 10px;
            text-align: center;
        }
        
        #leaderboard ol {
            padding-left: 25px;
        }
        
        #leaderboard li {
            margin: 5px 0;
        }
        
        #faceUpload {
            display: none;
        }
        
        #uploadBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            background: transparent;
            border: 2px solid #00FFFF;
            color: #00FFFF;
            cursor: pointer;
            border-radius: 5px;
            z-index: 200;
        }
        
        #uploadBtn:hover {
            background: #00FFFF;
            color: #0d0015;
        }
        
        @keyframes neonPulse {
            0%, 100% { filter: drop-shadow(0 0 20px #FF00FF) drop-shadow(0 0 40px #00FFFF); }
            50% { filter: drop-shadow(0 0 30px #00FFFF) drop-shadow(0 0 60px #FF00FF); }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        #touchControls {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 60;
            pointer-events: auto;
        }
        
        .touch-zone {
            width: 90px;
            height: 90px;
            border: 3px solid rgba(255, 0, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 0, 255, 0.8);
            font-size: 36px;
            background: rgba(255, 0, 255, 0.15);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        .touch-zone:active {
            background: rgba(255, 0, 255, 0.4);
            transform: scale(0.95);
        }
        
        .touch-zone.jump {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            width: 100px;
            height: 100px;
            font-size: 40px;
        }

        @media (min-width: 768px) {
            #touchControls { display: none; }
        }
        
        .screenShake {
            animation: shake 0.3s ease-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game"></canvas>
        <div id="crtOverlay"></div>
        <div id="ui">
            <div class="score-panel">
                <div class="label">SCORE</div>
                <span id="score">0</span><br>
                <span id="distance">0</span>m
            </div>
            <div class="score-panel" style="text-align: right;">
                <div class="label">HIGH</div>
                <span id="highScore">0</span>
            </div>
        </div>
        <div id="lives"></div>
        <div id="powerup"></div>
        <div id="overlay">
            <h1>90'S DREAM</h1>
            <div class="tagline">By Emran Hossain</div>
            <button id="startBtn">START GAME</button>
            <div class="prompt">[ PRESS SPACE TO START ]</div>
            <div class="controls">ARROWS / WASD to move • SPACE to jump</div>
        </div>
        <div id="touchControls">
            <div class="touch-zone" id="btnLeft">◀</div>
            <div class="touch-zone jump" id="btnJump">▲</div>
            <div class="touch-zone" id="btnRight">▶</div>
        </div>
        <input type="file" id="faceUpload" accept="image/*">
        <button id="uploadBtn">📷 Upload Face</button>
        <div id="charSelect">
            <h2>CHOOSE YOUR CHARACTER</h2>
            <div id="myCharsArea">
                <h3>📁 MY CHARACTERS</h3>
                <div class="char-grid" id="myCharGrid"></div>
            </div>
            <div id="allCharsArea">
                <h3>👥 ALL PLAYERS</h3>
                <div class="char-grid" id="allCharGrid"></div>
            </div>
            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="10">
            <button id="confirmChar">PLAY GAME</button>
        </div>
        <div id="leaderboard">
            <h3>🏆 TOP SCORES</h3>
            <ol id="scoreList"></ol>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const distanceEl = document.getElementById('distance');
        const highScoreEl = document.getElementById('highScore');
        const livesEl = document.getElementById('lives');
        const powerupEl = document.getElementById('powerup');
        const container = document.getElementById('gameContainer');

        let playerFace = null;
        let uploadedFace = null;
        let characterImages = [null, null, null];
        let selectedCharIndex = 0;

        let leaderboard = JSON.parse(localStorage.getItem('90sDreamLeaderboard')) || [];

        function updateLeaderboardUI() {
            const list = document.getElementById('scoreList');
            const top5 = leaderboard.slice(0, 5);
            list.innerHTML = top5.map((s, i) => `<li>${s.name}: ${s.score}</li>`).join('') || '<li>No scores yet</li>';
        }

        function saveScore(name, score) {
            leaderboard.push({ name, score });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('90sDreamLeaderboard', JSON.stringify(leaderboard));
            updateLeaderboardUI();
        }
        
        const faceUpload = document.getElementById('faceUpload');
        const uploadBtn = document.getElementById('uploadBtn');
        
        uploadBtn.addEventListener('click', () => {
            faceUpload.click();
        });
        
        faceUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        uploadedFace = img;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        let W, H;
        function resize() {
            W = canvas.width = container.clientWidth;
            H = canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const GRAVITY = 0.5;
        const JUMP_FORCE = -14;
        const MOVE_SPEED = 5.5;
        const MAX_FALL = 16;

        let gameState = 'title';
        let score = 0;
        let highScore = parseInt(localStorage.getItem('90sDreamHigh')) || 0;
        let distance = 0;
        let cameraX = 0;
        let lives = 3;
        let currentPowerup = null;
        let powerupTimer = 0;
        let invincibility = 0;
        let speedBoost = 0;
        let comboCount = 0;
        let comboTimer = 0;
        let comboMultiplier = 1;

        highScoreEl.textContent = highScore;

        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * 2000,
                y: Math.random() * H,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.5 + 0.1,
                alpha: Math.random() * 0.6 + 0.2,
                layer: Math.floor(Math.random() * 3)
            });
        }

        const gridLines = [];
        for (let i = 0; i < 20; i++) {
            gridLines.push({
                x: i * 100,
                speed: 0.3 + i * 0.05
            });
        }

        const player = {
            x: 100,
            y: 300,
            vx: 0,
            vy: 0,
            width: 64,
            height: 64,
            onGround: false,
            trail: [],
            facing: 1,
            frame: 0
        };

        const platforms = [];
        const coins = [];
        const powerups = [];
        const enemies = [];
        const particles = [];
        const damageTexts = [];

        function generatePlatform(x, y, w) {
            platforms.push({ x, y, width: w, height: 30 });
        }

        function generateCoin(x, y) {
            coins.push({ x, y: y - 60, radius: 16, collected: false });
        }

        function generatePowerup(x, y, type) {
            const types = { 'star': '⭐', 'lightning': '⚡', 'heart': '❤️' };
            powerups.push({ x, y: y - 60, type, icon: types[type], radius: 22 });
        }

        function generateEnemy(x, y, w) {
            enemies.push({
                x, y,
                width: 40,
                height: 36,
                vx: 2,
                startX: x,
                patrolWidth: w - 40,
                alive: true
            });
        }

        function initGame() {
            platforms.length = 0;
            coins.length = 0;
            powerups.length = 0;
            enemies.length = 0;
            particles.length = 0;
            damageTexts.length = 0;
            
            player.x = 100;
            player.y = 300;
            player.vx = 0;
            player.vy = 0;
            player.trail = [];
            player.onGround = false;
            player.facing = 1;
            
            cameraX = 0;
            score = 0;
            distance = 0;
            lives = 3;
            currentPowerup = null;
            powerupTimer = 0;
            invincibility = 0;
            speedBoost = 0;
            comboCount = 0;
            comboMultiplier = 1;

            generatePlatform(50, 450, 300);
            
            let lastX = 300;
            let lastY = 450;
            for (let i = 0; i < 25; i++) {
                const gap = 80 + Math.random() * 80;
                const yChange = (Math.random() - 0.5) * 90;
                lastX += gap;
                lastY = Math.max(280, Math.min(480, lastY + yChange));
                const width = 120 + Math.random() * 100;
                generatePlatform(lastX, lastY, width);
                
                const rand = Math.random();
                if (rand > 0.5) {
                    generateCoin(lastX + width / 2, lastY);
                } else if (rand > 0.75) {
                    const ptypes = ['star', 'lightning', 'heart'];
                    generatePowerup(lastX + width / 2, lastY, ptypes[Math.floor(Math.random() * 3)]);
                } else if (rand < 0.15 && width > 120) {
                    generateEnemy(lastX + 30, lastY - 36, width - 60);
                }
            }
            
            updateLivesDisplay();
            updatePowerupDisplay();
        }

        const keys = {};
        let touchLeft = false, touchRight = false, touchJump = false;

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyP' && gameState === 'playing') {
                gameState = 'paused';
                overlay.querySelector('h1').textContent = 'PAUSED';
                overlay.querySelector('.tagline').textContent = '';
                overlay.querySelector('.prompt').textContent = '[ PRESS P TO RESUME ]';
                overlay.classList.remove('hidden');
            } else if (e.code === 'KeyP' && gameState === 'paused') {
                gameState = 'playing';
                overlay.classList.add('hidden');
            } else if ((gameState === 'title' || gameState === 'gameover') && (e.code === 'Space' || e.code === 'Enter')) {
                startGame();
            }
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        function handlePointerStart(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) / rect.width;
            
            if (x < 0.33) touchLeft = true;
            else if (x > 0.66) touchRight = true;
            else touchJump = true;
        }

        function handlePointerEnd() {
            touchLeft = false;
            touchRight = false;
            touchJump = false;
        }

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (gameState === 'title' || gameState === 'gameover') {
                startGame();
                return;
            }
            handlePointerStart(e);
        });

        canvas.addEventListener('touchend', handlePointerEnd);
        
        canvas.addEventListener('mousedown', e => {
            if (gameState === 'title' || gameState === 'gameover') {
                startGame();
                return;
            }
            handlePointerStart(e);
        });

        canvas.addEventListener('mouseup', handlePointerEnd);

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');
        
        function addTouchListener(btn, key) {
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                e.stopPropagation();
                if (gameState === 'title' || gameState === 'gameover') {
                    startGame();
                    return;
                }
                if (key === 'left') touchLeft = true;
                if (key === 'right') touchRight = true;
                if (key === 'jump') touchJump = true;
            });
            
            btn.addEventListener('touchend', e => {
                e.preventDefault();
                e.stopPropagation();
                if (key === 'left') touchLeft = false;
                if (key === 'right') touchRight = false;
                if (key === 'jump') touchJump = false;
            });
            
            btn.addEventListener('mousedown', e => {
                e.preventDefault();
                if (gameState === 'title' || gameState === 'gameover') {
                    startGame();
                    return;
                }
                if (key === 'left') touchLeft = true;
                if (key === 'right') touchRight = true;
                if (key === 'jump') touchJump = true;
            });
            
            btn.addEventListener('mouseup', e => {
                e.preventDefault();
                if (key === 'left') touchLeft = false;
                if (key === 'right') touchRight = false;
                if (key === 'jump') touchJump = false;
            });
            
            btn.addEventListener('mouseleave', e => {
                if (key === 'left') touchLeft = false;
                if (key === 'right') touchRight = false;
                if (key === 'jump') touchJump = false;
            });
        }
        
        addTouchListener(btnLeft, 'left');
        addTouchListener(btnRight, 'right');
        addTouchListener(btnJump, 'jump');

        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', () => {
            document.getElementById('charSelect').classList.add('show');
            initCharSelectScreen();
        });
        startBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            document.getElementById('charSelect').classList.add('show');
            initCharSelectScreen();
        });

        const charSelect = document.getElementById('charSelect');
        const confirmCharBtn = document.getElementById('confirmChar');
        const nameInput = document.getElementById('nameInput');
        const myCharGrid = document.getElementById('myCharGrid');
        const allCharGrid = document.getElementById('allCharGrid');

        let allSavedChars = JSON.parse(localStorage.getItem('90sDreamAllChars')) || [];
        let selectedPlayerChar = null;
        let selectedPlayerName = '';

        function initCharSelectScreen() {
            selectedPlayerChar = null;
            selectedPlayerName = '';
            nameInput.value = '';
            nameInput.classList.remove('show');
            
            myCharGrid.innerHTML = '';
            const myChars = allSavedChars.filter(c => c.isMy);
            
            if (myChars.length > 0) {
                myChars.forEach((charData, idx) => {
                    const slot = createCharSlot(charData.img, charData.name, true);
                    myCharGrid.appendChild(slot);
                });
            } else {
                const addSlot = document.createElement('div');
                addSlot.className = 'char-slot';
                addSlot.innerHTML = '<span class="plus">+</span><span class="add-char">ADD MY CHAR</span>';
                addSlot.addEventListener('click', () => {
                    addMyCharacter();
                });
                myCharGrid.appendChild(addSlot);
            }
            
            allCharGrid.innerHTML = '';
            allSavedChars.forEach((charData, idx) => {
                if (!charData.isMy) {
                    const slot = createCharSlot(charData.img, charData.name, false);
                    allCharGrid.appendChild(slot);
                }
            });
            
            if (allSavedChars.length === 0) {
                allCharGrid.innerHTML = '<div style="color:#888;font-size:16px;">No players yet. Add your character first!</div>';
            }
        }

        function createCharSlot(imgSrc, name, isMyChar) {
            const slot = document.createElement('div');
            slot.className = 'char-slot';
            
            const img = document.createElement('img');
            img.src = imgSrc;
            slot.appendChild(img);
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'char-name';
            nameSpan.textContent = name;
            slot.appendChild(nameSpan);
            
            slot.addEventListener('click', () => {
                document.querySelectorAll('.char-slot').forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
                selectedPlayerChar = imgSrc;
                selectedPlayerName = name;
                confirmCharBtn.textContent = isMyChar ? 'PLAY GAME' : `PLAY AS ${name}`;
                confirmCharBtn.style.display = 'block';
            });
            
            return slot;
        }

        function addMyCharacter() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        nameInput.classList.add('show');
                        nameInput.value = '';
                        nameInput.focus();
                        nameInput.dataset.image = event.target.result;
                        confirmCharBtn.style.display = 'block';
                        confirmCharBtn.textContent = 'SAVE & PLAY';
                    };
                    reader.readAsDataURL(file);
                }
            };
        }

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && nameInput.value.trim()) {
                saveAndPlay();
            }
        });

        function saveAndPlay() {
            const name = nameInput.value.trim() || 'Player';
            const image = nameInput.dataset.image;
            
            allSavedChars.push({
                name: name,
                img: image,
                isMy: true
            });
            
            localStorage.setItem('90sDreamAllChars', JSON.stringify(allSavedChars));
            delete nameInput.dataset.image;
            nameInput.classList.remove('show');
            
            uploadedFace = new Image();
            uploadedFace.onload = () => {};
            uploadedFace.src = image;
            
            initCharSelectScreen();
        }

        confirmCharBtn.addEventListener('click', () => {
            if (nameInput.classList.contains('show') && nameInput.dataset.image) {
                saveAndPlay();
            } else if (selectedPlayerChar) {
                uploadedFace = new Image();
                uploadedFace.onload = () => {};
                uploadedFace.src = selectedPlayerChar;
                
                charSelect.classList.remove('show');
                initGame();
                gameState = 'playing';
                overlay.classList.add('hidden');
            } else {
                addMyCharacter();
            }
        });

        function startGame() {
            initGame();
            gameState = 'playing';
            overlay.classList.add('hidden');
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > 0) {
                saveScore('Player', score);
            }
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('90sDreamHigh', highScore);
                highScoreEl.textContent = highScore;
            }
            drawGameOverScreen();
            
            startBtn.textContent = 'PLAY AGAIN';
            overlay.classList.remove('hidden');
        }

        function drawGameOverScreen() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#0d0015');
            gradient.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = 'rgba(255, 0, 255, 0.03)';
            for (let y = 0; y < H; y += 50) {
                for (let x = 0; x < W; x += 100) {
                    ctx.fillRect(x, y, 50, 2);
                    ctx.fillRect(x + 50, y + 25, 50, 2);
                }
            }
            
            const centerX = W / 2;
            const centerY = H / 2;
            const faceSize = Math.min(W, H) * 0.5;
            
            if (uploadedFace) {
                ctx.save();
                ctx.beginPath();
                const r = 40;
                const fx = centerX - faceSize / 2;
                const fy = centerY - faceSize / 2 - 50;
                ctx.moveTo(fx + r, fy);
                ctx.lineTo(fx + faceSize - r, fy);
                ctx.quadraticCurveTo(fx + faceSize, fy, fx + faceSize, fy + r);
                ctx.lineTo(fx + faceSize, fy + faceSize - r);
                ctx.quadraticCurveTo(fx + faceSize, fy + faceSize, fx + faceSize - r, fy + faceSize);
                ctx.lineTo(fx + r, fy + faceSize);
                ctx.quadraticCurveTo(fx, fy + faceSize, fx, fy + faceSize - r);
                ctx.lineTo(fx, fy + r);
                ctx.quadraticCurveTo(fx, fy, fx + r, fy);
                ctx.closePath();
                ctx.clip();
                
                const imgAspect = uploadedFace.width / uploadedFace.height;
                const boxAspect = faceSize / faceSize;
                let sx = 0, sy = 0, sw = uploadedFace.width, sh = uploadedFace.height;
                
                if (imgAspect > boxAspect) {
                    sw = uploadedFace.height * boxAspect;
                    sx = (uploadedFace.width - sw) / 2;
                } else {
                    sh = uploadedFace.width / boxAspect;
                    sy = (uploadedFace.height - sh) / 2;
                }
                
                ctx.drawImage(uploadedFace, sx, sy, sw, sh, fx, fy, faceSize, faceSize);
                ctx.restore();
                
                ctx.strokeStyle = '#FF00FF';
                ctx.lineWidth = 6;
                ctx.beginPath();
                const r2 = 40;
                ctx.moveTo(fx + r2, fy);
                ctx.lineTo(fx + faceSize - r2, fy);
                ctx.quadraticCurveTo(fx + faceSize, fy, fx + faceSize, fy + r2);
                ctx.lineTo(fx + faceSize, fy + faceSize - r2);
                ctx.quadraticCurveTo(fx + faceSize, fy + faceSize, fx + faceSize - r2, fy + faceSize);
                ctx.lineTo(fx + r2, fy + faceSize);
                ctx.quadraticCurveTo(fx, fy + faceSize, fx, fy + faceSize - r2);
                ctx.lineTo(fx, fy + r2);
                ctx.quadraticCurveTo(fx, fy, fx + r2, fy);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath();
                ctx.arc(centerX, centerY - 50, faceSize / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FF00FF';
                ctx.lineWidth = 6;
                ctx.stroke();
            }
            
            ctx.font = 'bold 64px VT323';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#FF0044';
            ctx.shadowColor = '#FF0044';
            ctx.shadowBlur = 20;
            ctx.fillText('GAME OVER', centerX, centerY + faceSize / 2 + 80);
            ctx.shadowBlur = 0;
            
            ctx.font = '32px VT323';
            ctx.fillStyle = '#FFFF00';
            ctx.shadowColor = '#FFFF00';
            ctx.shadowBlur = 10;
            ctx.fillText(`SCORE: ${score}`, centerX, centerY + faceSize / 2 + 140);
            ctx.shadowBlur = 0;
            
            ctx.font = '24px VT323';
            ctx.fillStyle = '#00FFFF';
            ctx.fillText('PRESS SPACE OR TAP TO RETRY', centerX, H - 80);
            
            if (!overlay.classList.contains('hidden')) return;
        }

        function takeDamage() {
            if (invincibility > 0) return;
            
            lives--;
            updateLivesDisplay();
            container.classList.add('screenShake');
            setTimeout(() => container.classList.remove('screenShake'), 300);
            
            if (lives <= 0) {
                gameOver();
            } else {
                player.x = Math.max(100, cameraX + 100);
                player.y = 200;
                player.vx = 0;
                player.vy = 0;
                invincibility = 120;
                currentPowerup = null;
                powerupTimer = 0;
                speedBoost = 0;
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 3,
                    life: 1,
                    color,
                    size: Math.random() * 6 + 3
                });
            }
        }

        function addDamageText(x, y, text, color) {
            damageTexts.push({ x, y, text, color, life: 1 });
        }

        function updateLivesDisplay() {
            livesEl.innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
        }

        function updatePowerupDisplay() {
            if (currentPowerup) {
                const icons = { 'star': '⭐ INVINCIBLE', 'lightning': '⚡ SPEED', 'heart': '❤️ LIFE+' };
                powerupEl.textContent = icons[currentPowerup] + ' ' + Math.ceil(powerupTimer / 60);
            } else {
                powerupEl.textContent = '';
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            const moveSpeed = speedBoost > 0 ? MOVE_SPEED * 1.8 : MOVE_SPEED;

            if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) {
                player.vx = -moveSpeed;
                player.facing = -1;
            } else if (keys['ArrowRight'] || keys['KeyD'] || touchRight) {
                player.vx = moveSpeed;
                player.facing = 1;
            } else {
                player.vx *= 0.85;
            }

            if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW'] || touchJump) && player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
                spawnParticles(player.x + player.width/2, player.y + player.height, '#00FFFF', 6);
                touchJump = false;
            }

            player.vy += GRAVITY;
            if (player.vy > MAX_FALL) player.vy = MAX_FALL;

            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 50) player.x = 50;

            player.frame++;
            player.trail.unshift({ 
                x: player.x + player.width/2, 
                y: player.y + player.height/2,
                frame: player.frame 
            });
            if (player.trail.length > 10) player.trail.pop();

            player.onGround = false;

            const playerBottom = player.y + player.height;
            const playerRight = player.x + player.width;

            for (const plat of platforms) {
                if (playerRight > plat.x + 5 && player.x < plat.x + plat.width - 5) {
                    if (playerBottom >= plat.y && playerBottom <= plat.y + 35 && player.vy > 0) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    }
                }
            }

            if (comboTimer > 0) {
                comboTimer--;
            } else {
                comboMultiplier = 1;
                comboCount = 0;
            }

            for (const coin of coins) {
                if (coin.collected) continue;
                const dx = (player.x + player.width/2) - coin.x;
                const dy = (player.y + player.height/2) - coin.y;
                if (Math.sqrt(dx*dx + dy*dy) < coin.radius + 30) {
                    coin.collected = true;
                    comboCount++;
                    if (comboTimer > 0) {
                        comboMultiplier = Math.min(4, 1 + Math.floor(comboCount / 3));
                    }
                    comboTimer = 120;
                    const points = 10 * comboMultiplier;
                    score += points;
                    spawnParticles(coin.x, coin.y, '#FFFF00', 15);
                    addDamageText(coin.x, coin.y - 20, `+${points}`, '#FFFF00');
                }
            }

            for (const pup of powerups) {
                if (pup.collected) continue;
                const dx = (player.x + player.width/2) - pup.x;
                const dy = (player.y + player.height/2) - pup.y;
                if (Math.sqrt(dx*dx + dy*dy) < pup.radius + 30) {
                    pup.collected = true;
                    if (pup.type === 'star') {
                        currentPowerup = 'star';
                        invincibility = 300;
                        spawnParticles(pup.x, pup.y, '#FF00FF', 20);
                    } else if (pup.type === 'lightning') {
                        currentPowerup = 'lightning';
                        speedBoost = 300;
                        spawnParticles(pup.x, pup.y, '#39FF14', 20);
                    } else if (pup.type === 'heart') {
                        lives = Math.min(5, lives + 1);
                        updateLivesDisplay();
                        spawnParticles(pup.x, pup.y, '#FF0000', 20);
                    }
                    powerupTimer = 300;
                    updatePowerupDisplay();
                }
            }

            for (const enemy of enemies) {
                if (!enemy.alive) continue;
                enemy.x += enemy.vx;
                if (enemy.x <= enemy.startX || enemy.x >= enemy.startX + enemy.patrolWidth) {
                    enemy.vx *= -1;
                }
                
                const dx = (player.x + player.width/2) - (enemy.x + enemy.width/2);
                const dy = (player.y + player.height/2) - (enemy.y + enemy.height/2);
                
                if (Math.abs(dx) < 40 && Math.abs(dy) < 40) {
                    if (player.vy > 5 && player.y < enemy.y) {
                        enemy.alive = false;
                        player.vy = -8;
                        score += 50;
                        addDamageText(enemy.x, enemy.y - 30, '+50', '#39FF14');
                        spawnParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#FF0000', 25);
                    } else {
                        takeDamage();
                    }
                }
            }

            if (invincibility > 0) invincibility--;
            if (powerupTimer > 0) powerupTimer--;
            if (speedBoost > 0) speedBoost--;
            if (powerupTimer <= 0) {
                currentPowerup = null;
                updatePowerupDisplay();
            }

            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.025;
            }

            for (const dt of damageTexts) {
                dt.y -= 1;
                dt.life -= 0.02;
            }

            if (player.y > H + 50) {
                takeDamage();
                if (gameState === 'playing') {
                    player.y = -100;
                    player.vy = 0;
                }
            }

            const targetCameraX = player.x - W * 0.25;
            if (targetCameraX > cameraX) {
                cameraX = targetCameraX;
                distance = Math.floor(cameraX / 10);
            }

            for (const star of stars) {
                star.x -= star.speed * (1 + star.layer * 0.5);
                if (star.x < 0) {
                    star.x = W + 50;
                    star.y = Math.random() * H;
                }
            }

            for (const line of gridLines) {
                line.x -= line.speed;
                if (line.x < -100) line.x += 2000;
            }

            const lastPlat = platforms[platforms.length - 1];
            if (lastPlat.x - cameraX < W + 300) {
                const gap = 80 + Math.random() * 80;
                const yChange = (Math.random() - 0.5) * 90;
                const newX = lastPlat.x + lastPlat.width + gap;
                const newY = Math.max(280, Math.min(480, lastPlat.y + yChange));
                const width = 120 + Math.random() * 100;
                generatePlatform(newX, newY, width);
                
                const rand = Math.random();
                if (rand > 0.5) {
                    generateCoin(newX + width / 2, newY);
                } else if (rand > 0.75) {
                    const ptypes = ['star', 'lightning', 'heart'];
                    generatePowerup(newX + width / 2, newY, ptypes[Math.floor(Math.random() * 3)]);
                } else if (rand < 0.15 && width > 120) {
                    generateEnemy(newX + 30, newY - 36, width - 60);
                }
            }

            while (platforms.length > 0 && platforms[0].x + platforms[0].width < cameraX - 100) {
                platforms.shift();
            }
            while (coins.length > 0 && coins[0].x < cameraX - 100) coins.shift();
            while (powerups.length > 0 && powerups[0].x < cameraX - 100) powerups.shift();
            while (enemies.length > 0 && enemies[0].x + enemies[0].width < cameraX - 100) enemies.shift();

            score = distance + score % 1000;
            scoreEl.textContent = score;
            distanceEl.textContent = distance;
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#0d0015');
            gradient.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = 'rgba(255, 0, 255, 0.03)';
            for (const line of gridLines) {
                for (let y = 0; y < H; y += 50) {
                    ctx.fillRect(line.x, y, 50, 2);
                    ctx.fillRect(line.x + 50, y + 25, 50, 2);
                }
            }

            for (const star of stars) {
                const colors = ['#FF00FF', '#00FFFF', '#FFFF00', '#39FF14'];
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size * (star.layer + 1), 0, Math.PI * 2);
                ctx.fillStyle = colors[star.layer];
                ctx.globalAlpha = star.alpha * (0.5 + Math.sin(Date.now() / 500 + star.x) * 0.3);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.translate(-cameraX, 0);

            for (const plat of platforms) {
                if (plat.x + plat.width < cameraX || plat.x > cameraX + W) continue;

                ctx.fillStyle = '#2a1a4a';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                
                ctx.fillStyle = '#FF00FF';
                ctx.fillRect(plat.x, plat.y, plat.width, 4);
                
                ctx.fillStyle = '#4a2a6a';
                for (let px = plat.x + 8; px < plat.x + plat.width - 8; px += 20) {
                    ctx.fillRect(px, plat.y + 8, 12, 8);
                    ctx.fillStyle = '#3a1a5a';
                    ctx.fillRect(px + 2, plat.y + 10, 8, 4);
                    ctx.fillStyle = '#4a2a6a';
                }

                ctx.fillStyle = '#00FFFF';
                ctx.globalAlpha = 0.3;
                ctx.fillRect(plat.x, plat.y + plat.height - 4, plat.width, 2);
                ctx.globalAlpha = 1;
            }

            for (const coin of coins) {
                if (coin.collected) continue;
                if (coin.x < cameraX - 50 || coin.x > cameraX + W + 50) continue;

                const bounce = Math.sin(Date.now() / 150) * 4;
                const spin = Math.sin(Date.now() / 100);
                
                ctx.save();
                ctx.translate(coin.x, coin.y + bounce);
                ctx.scale(spin > 0 ? 1 : 0.3, 1);
                
                ctx.beginPath();
                ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFF00';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-6, -6, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                
                ctx.strokeStyle = '#FF8800';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();
            }

            for (const pup of powerups) {
                if (pup.collected) continue;
                if (pup.x < cameraX - 50 || pup.x > cameraX + W + 50) continue;

                const float = Math.sin(Date.now() / 200) * 8;
                
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(pup.icon, pup.x, pup.y + float + 12);
                
                ctx.beginPath();
                ctx.arc(pup.x, pup.y + float, pup.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 3;
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 100) * 0.3;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            for (const enemy of enemies) {
                if (!enemy.alive) continue;
                if (enemy.x + enemy.width < cameraX || enemy.x > cameraX + W) continue;

                const bounce = Math.abs(Math.sin(Date.now() / 150)) * 6;
                
                ctx.fillStyle = '#FF0044';
                ctx.beginPath();
                ctx.ellipse(enemy.x + enemy.width/2, enemy.y + enemy.height - bounce/2, enemy.width/2, enemy.height/2 - bounce/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FF6666';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width * 0.3, enemy.y + enemy.height * 0.3, 6, 0, Math.PI * 2);
                ctx.arc(enemy.x + enemy.width * 0.7, enemy.y + enemy.height * 0.3, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            for (const dt of damageTexts) {
                ctx.globalAlpha = dt.life;
                ctx.font = 'bold 20px VT323';
                ctx.textAlign = 'center';
                ctx.fillStyle = dt.color;
                ctx.fillText(dt.text, dt.x, dt.y);
            }
            ctx.globalAlpha = 1;

            for (let i = player.trail.length - 1; i >= 0; i--) {
                const t = player.trail[i];
                const alpha = (1 - i / player.trail.length) * 0.5;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FF00FF';
                ctx.beginPath();
                ctx.arc(t.x, t.y, 16 - i, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            const playerColor = invincibility > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? '#FFFFFF' : '#00FFFF';
            
            if (speedBoost > 0) {
                ctx.shadowColor = '#39FF14';
                ctx.shadowBlur = 25;
            } else {
                ctx.shadowColor = '#00FFFF';
                ctx.shadowBlur = 20;
            }
            
            ctx.fillStyle = playerColor;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = '#FF00FF';
            ctx.fillRect(player.x - 2, player.y - 2, player.width + 4, player.height + 4);
            ctx.fillStyle = playerColor;
            ctx.fillRect(player.x + 2, player.y + 2, player.width - 4, player.height - 4);
            
            ctx.shadowBlur = 0;

            const faceImg = uploadedFace || null;
            const squircleX = player.x + 2;
            const squircleY = player.y + 2;
            const squircleW = player.width - 4;
            const squircleH = player.height - 4;
            
            ctx.save();
            ctx.beginPath();
            const r = 16;
            ctx.moveTo(squircleX + r, squircleY);
            ctx.lineTo(squircleX + squircleW - r, squircleY);
            ctx.quadraticCurveTo(squircleX + squircleW, squircleY, squircleX + squircleW, squircleY + r);
            ctx.lineTo(squircleX + squircleW, squircleY + squircleH - r);
            ctx.quadraticCurveTo(squircleX + squircleW, squircleY + squircleH, squircleX + squircleW - r, squircleY + squircleH);
            ctx.lineTo(squircleX + r, squircleY + squircleH);
            ctx.quadraticCurveTo(squircleX, squircleY + squircleH, squircleX, squircleY + squircleH - r);
            ctx.lineTo(squircleX, squircleY + r);
            ctx.quadraticCurveTo(squircleX, squircleY, squircleX + r, squircleY);
            ctx.closePath();
            ctx.clip();
            
            if (faceImg) {
                const imgAspect = faceImg.width / faceImg.height;
                const boxAspect = squircleW / squircleH;
                let sx = 0, sy = 0, sw = faceImg.width, sh = faceImg.height;
                
                if (imgAspect > boxAspect) {
                    sw = faceImg.height * boxAspect;
                    sx = (faceImg.width - sw) / 2;
                } else {
                    sh = faceImg.width / boxAspect;
                    sy = (faceImg.height - sh) / 2;
                }
                
                ctx.drawImage(faceImg, sx, sy, sw, sh, squircleX, squircleY, squircleW, squircleH);
            } else {
                ctx.fillStyle = '#00FFFF';
                ctx.fillRect(squircleX, squircleY, squircleW, squircleH);
            }
            ctx.restore();
            
            ctx.strokeStyle = '#FF00FF';
            ctx.lineWidth = 4;
            ctx.beginPath();
            const r2 = 16;
            ctx.moveTo(squircleX + r2, squircleY);
            ctx.lineTo(squircleX + squircleW - r2, squircleY);
            ctx.quadraticCurveTo(squircleX + squircleW, squircleY, squircleX + squircleW, squircleY + r2);
            ctx.lineTo(squircleX + squircleW, squircleY + squircleH - r2);
            ctx.quadraticCurveTo(squircleX + squircleW, squircleY + squircleH, squircleX + squircleW - r2, squircleY + squircleH);
            ctx.lineTo(squircleX + r2, squircleY + squircleH);
            ctx.quadraticCurveTo(squircleX, squircleY + squircleH, squircleX, squircleY + squircleH - r2);
            ctx.lineTo(squircleX, squircleY + r2);
            ctx.quadraticCurveTo(squircleX, squircleY, squircleX + r2, squircleY);
            ctx.stroke();
            
            const armOffset = player.onGround ? 0 : Math.sin(Date.now() / 100) * 12;
            const moveOffset = Math.abs(player.vx) * 3;
            
            ctx.fillStyle = '#FF00FF';
            ctx.fillRect(squircleX - 10, squircleY + squircleH * 0.3, 12, 28);
            ctx.fillRect(squircleX + squircleW - 2, squircleY + squircleH * 0.3, 12, 28);
            
            ctx.strokeStyle = '#00FFFF';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(squircleX + 4, squircleY + squircleH * 0.4);
            ctx.lineTo(squircleX - 12, squircleY + squircleH * 0.4 + armOffset - moveOffset);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(squircleX + squircleW - 4, squircleY + squircleH * 0.4);
            ctx.lineTo(squircleX + squircleW + 12, squircleY + squircleH * 0.4 + armOffset + moveOffset);
            ctx.stroke();

            ctx.restore();
        }

        function gameLoop() {
            update();
            if (gameState === 'gameover') {
                drawGameOverScreen();
            } else {
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
